<!DOCTYPE html>
<html>
<head>
<title>Fire Scene Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  text-align: center;
  padding: 40px 20px;
  transition: background 0.3s;
}

.box {
  max-width: 420px;
  margin: auto;
  background: #1f2937;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(255,0,0,0.2);
}

button {
  display: block;
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 8px;
  background: #e11d48;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.flash {
  background: #7f1d1d !important;
}
</style>
</head>

<body>

<h1>🔥 Fire Scene Simulator</h1>
<h2>What would YOU do?</h2>

<div class="box">

<p id="timer">Time: 10</p>
<p id="scenario">Ready to Start?</p>

<button onclick="startGame()" id="startBtn">Start Scenario</button>

<div id="choices" style="display:none;"></div>

<p id="result"></p>

<button onclick="restartGame()" id="restartBtn" style="display:none;">Restart Scenario</button>

</div>

<script>
let timeLeft = 10;
let timer = null;
let gameActive = false;
let canClick = true;

// 🔥 SIM STATE
let fireLevel = 1;
let floorStability = 100;
let phase = "arrival";

// 🔁 TRACK REPEATS
let lastAction = "";
let repeatCount = 0;

// START
function startGame() {

  fireLevel = 1;
  floorStability = 100;
  phase = "arrival";
  lastAction = "";
  repeatCount = 0;

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("choices").style.display = "block";

  gameActive = true;
  canClick = true;

  document.getElementById("scenario").innerText =
    "🚒 Arrive on scene — smoke showing. What do you do?";

  document.getElementById("choices").innerHTML = `
    <button onclick="makeChoice('sizeup')">360 Size-Up</button>
    <button onclick="makeChoice('attack')">Interior Attack</button>
  `;

  resetTimer();
}

// TIMER
function startTimer() {
  clearInterval(timer);

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "Time: " + timeLeft;

    if (timeLeft <= 5) {
      document.body.style.background = "#450a0a";
    }

    if (timeLeft <= 0) {
      clearInterval(timer);
      endGame("⛔ You hesitated too long.");
    }
  }, 1000);
}

function resetTimer() {
  clearInterval(timer);
  timeLeft = 10;
  document.body.style.background = "#020617";
  document.getElementById("timer").innerText = "Time: 10";
  startTimer();
}

// MAIN LOOP
function nextStage() {

  canClick = true;

  // 🔰 SIZE-UP PHASE
  if (phase === "arrival") {

    phase = "operations";

    document.getElementById("scenario").innerText =
      "Command completes 360 — fire showing second floor Charlie side. What now?";

    document.getElementById("choices").innerHTML = `
      <button onclick="makeChoice('line')">Stretch Line</button>
      <button onclick="makeChoice('search')">Primary Search</button>
      <button onclick="makeChoice('vent')">Vent Roof</button>
    `;

    resetTimer();
    document.getElementById("result").innerText = "";
    return;
  }

  // 🔥 SIMULATION LOOP
  let text = "";

  if (fireLevel >= 5) {
    text += "🔥 Heavy fire throughout structure. ";
  }
  else if (fireLevel >= 3) {
    text += "🔥 Fire intensifying. ";
  }
  else {
    text += "🔥 Fire showing. ";
  }

  if (floorStability <= 50) {
    text += "⚠️ Floor weakening. ";
  }

  if (floorStability <= 20) {
    text += "💥 Floor near collapse! ";
  }

  document.getElementById("scenario").innerText =
    text + "What's your move?";

  document.getElementById("choices").innerHTML = `
    <button onclick="makeChoice('line')">Stretch Line</button>
    <button onclick="makeChoice('search')">Primary Search</button>
    <button onclick="makeChoice('vent')">Vent Roof</button>
    <button onclick="makeChoice('cool')">Cool Overhead</button>
    <button onclick="makeChoice('push')">Push Interior</button>
    <button onclick="makeChoice('backout')">Back Out</button>
  `;

  resetTimer();
  document.getElementById("result").innerText = "";
}

// DECISIONS
function makeChoice(choice) {

  if (!gameActive || !canClick) return;

  canClick = false;
  clearInterval(timer);

  let message = "";

  // 🔁 TRACK REPEATS
  if (choice === lastAction) {
    repeatCount++;
  } else {
    repeatCount = 0;
  }
  lastAction = choice;

  // 🚒 ARRIVAL
  if (phase === "arrival") {

    if (choice === "sizeup") {
      message = "✅ Good — performing a 360.";
      document.getElementById("result").innerText = message;
      setTimeout(nextStage, 1500);
      return;
    } else {
      message = "⚠️ Acting before size-up — risky.";
      floorStability -= 10;
    }
  }

  // 🔥 OPERATIONS
  else {

    if (choice === "line") {
      message = "💧 Water applied. Fire darkening.";
      fireLevel = Math.max(1, fireLevel - 1);
    }

    else if (choice === "vent") {
      message = "🔥 Vent without coordination — fire intensifies!";
      fireLevel += 1;
      floorStability -= 20;
      flashScreen();
    }

    else if (choice === "search") {
      message = "⚠️ Searching in active fire conditions.";
      floorStability -= 10;
    }

    else if (choice === "cool") {
      message = "💧 Cooling overhead. Temps improving.";
      fireLevel = Math.max(1, fireLevel - 1);
    }

    else if (choice === "push") {

      if (floorStability <= 30) {
        flashScreen();
        return endGame("💥 FLOOR COLLAPSE — MAYDAY!");
      }

      message = "🔥 Aggressive push on fire.";
    }

    else if (choice === "backout") {
      return endGame("🚒 Defensive strategy — structure lost.");
    }

    // 🔁 REPEAT PENALTY
    if (repeatCount >= 2) {
      fireLevel += 1;
      floorStability -= 10;
      message += " ⚠️ Repeating ineffective action — conditions worsening.";
    }

    // 🔥 FIRE ALWAYS GROWS
    fireLevel += 1;

    // 🔥 LOSS CONDITIONS
    if (fireLevel >= 6) {
      return endGame("🔥 Fire out of control — structure lost.");
    }

    if (floorStability <= 0) {
      return endGame("💥 Structure collapse — catastrophic failure.");
    }

    // 🔥 WIN CONDITION
    if (fireLevel <= 1 && floorStability > 30) {
      return endGame("🔥 Fire knocked — good stop.");
    }
  }

  document.getElementById("result").innerText = message;

  setTimeout(nextStage, 1500);
}

// VISUAL
function flashScreen() {
  document.body.classList.add("flash");
  setTimeout(() => document.body.classList.remove("flash"), 300);
}

// END
function endGame(msg) {
  gameActive = false;

  document.getElementById("scenario").innerText = "SCENARIO COMPLETE";
  document.getElementById("result").innerText = msg;

  document.getElementById("restartBtn").style.display = "block";
}

// RESTART
function restartGame() {
  location.reload();
}
</script>

<hr style="margin-top:30px; opacity:0.2;">

<p style="font-size:12px; opacity:0.6;">
Built by Code 3 Leads LLC<br>
Baltimore County, Maryland 🇺🇸
</p>

</body>
</html>
